services:
  mysql:
    image: mysql:8.0
    container_name: nail_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: nailea
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nail_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=nailea
      - DATABASE_URL=mysql://admin:password@mysql:3306/nailea
      - JWT_SECRET=nailea-studio-super-secret-key-change-this-in-production-2026
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

  prisma-studio:
    image: node:20-alpine
    container_name: nail_prisma_studio
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=mysql://admin:password@mysql:3306/nailea
      - BROWSER=none
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma studio --port 5555 --browser none"

volumes:
  mysql_data:
